<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tienda Oly</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="./css/styles.css">

  <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="./assets/favicon/site.webmanifest">

</head>

<body>

<!-- NAVBAR -->
<header class="nav-olly">

<div class="container-fluid">

<div class="d-flex align-items-center justify-content-between">

<!-- LOGO -->
<div class="d-flex align-items-center gap-3">
<img src="assets/img/logo.png" class="logo" onclick="window.location.href='index.html'">
<span class="nombre-tienda">Tienda Oly</span>
</div>

<!-- BUSCADOR -->
<form class="buscador-wrapper d-none d-md-flex">
<input type="text" class="buscador-input" placeholder="Buscar productos..." id="buscador">

<button class="btn-buscar">
<i class="bi bi-search"></i>
</button>
</form>

<!-- CUENTA -->
<div class="user-box">
  <button class="user-trigger" onclick="window.location.href='./pages/login.html'">
  <i class="bi bi-person-circle"></i>
  Iniciar sesión <strong>Cuenta</strong>
  </button>
</div>

</div>
</div>
</header>

<!-- SUBNAV -->
<div class="subnav" style="max-width:100% !important; display:flex; flex-wrap:wrap; align-items:center; gap:10px;">

  <div class="dropdown">
    <button class="btn-categorias" id="btnCat">
      <i class="bi bi-list-ul"></i> Todas las categorías 
      <span id="caret"><i class="bi bi-caret-down"></i></span>
    </button>

    <div class="dropdown-menu" id="menuCat">
      <ul id="categories-list">
      </ul>
    </div>
  </div>



  <span style="margin:0 8px;">|</span>

  <a href="index.html">Inicio</a>
  <a href="./pages/products.html">Catálogo</a>	
  <a href="./pages/contact.html">Contacto</a>
  <a href="./pages/about.html">Sobre Nosotros</a>

</div>

<!-- CONTENIDO -->
<main class="container mt-4">

<section id="categorias" class="container my-5">

  <h2 class="titulo-seccion mb-4">
    Categorías 🧺
  </h2>

  <div class="categorias-scroll" id="categorias-scroll">
  </div>

</section>

<section id="productos" class="container my-5">

  <h2 class="titulo-seccion mb-4">
    Productos destacados 🛒🔥
  </h2>

  <div class="productos-scroll" id="productos-scroll">
  </div>

</section>

<section id="ofertas" class="container my-5">

  <h2 class="titulo-seccion mb-4">
    Ofertas recientes 🔖⭐
  </h2>

  <div class="productos-scroll" id="ofertas-scroll">
  </div>

</section>

</main>

<footer class="footer-olly mt-5">

<div class="container text-center py-4">

<p class="mb-0">
© 2026 Tienda Oly
</p>

</div>

</footer>
<script
>const formBuscador = document.querySelector(".buscador-wrapper")

if(formBuscador){

  formBuscador.addEventListener("submit", e => {

    e.preventDefault()

    const input = document.getElementById("buscador")
    const search = input.value.trim()

    if(search){
      window.location.href = `./pages/products.html?search=${encodeURIComponent(search)}`
    }

  })
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>

</body>
</html>
