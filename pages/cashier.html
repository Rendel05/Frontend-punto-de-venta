<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panel Cajero</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/admin.css"> <!-- reutilizamos -->

<script type="module">
  import { requireAuth, logout, getNickname, getUserId } from "../js/auth.js";

  requireAuth("Cajero");

  const name = getNickname();
  if (name) {
    document.getElementById("user").textContent = name;
  }

  document.getElementById("logout").addEventListener("click", logout);

  window.USER_ID = getUserId();
</script>

</head>

<body>

<header class="navbar navbar-dark bg-dark px-3 flex-wrap">

  <div class="d-flex align-items-center flex-grow-1">
    <button class="btn btn-outline-light d-md-none me-2" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>

    <span class="navbar-brand d-flex align-items-center">
      <img src="../assets/img/logo.png" style="width: 4rem; margin-right: 1rem;">
      Panel de Cajero
    </span>
  </div>

  <button id="logout" class="btn btn-danger btn-sm">
    <i class="bi bi-x-octagon"></i> Cerrar sesión
  </button>

</header>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-2 sidebar" id="sidebar">
      <nav class="nav flex-column">
        <p style="color:white;">Sesión iniciadad como <strong id="user"></strong></p>

        <a class="nav-link" data-route="ventas">
          <i class="bi bi-cart"></i> Ventas
        </a>

        <a class="nav-link" data-route="retiros">
          <i class="bi bi-cash-stack"></i> Retiros
        </a>

      </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="col-md-10 p-4" id="cashier-content"></main>

  </div>
</div>

<div id="overlay" onclick="toggleSidebar()"></div>


<footer class="mt-auto bg-dark text-secondary text-center p-3 lh-base small">
    <p class="mb-1">
      Panel de Cajeros · v2.0 · Servidor:
      <span id="fechaHora"></span>
    </p>

    <p class="mb-1">
      Desarrollado por
      <a href="https://github.com/Rendel05"
         class="fw-bold text-primary text-decoration-none"
         target="_blank" rel="noopener">
        Pedro M
      </a>
      · 2026
    </p>

    <p class="mb-0">
      © 2026 Rendel 05 — Todos los derechos reservados.
    </p>
  </footer>

<script>
  setInterval(()=>{
  document.getElementById('fechaHora').textContent =
    new Date().toLocaleString('es-MX');
},1000);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/cashier.js"></script>

<script>
function toggleSidebar(forceClose = false) {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  if (forceClose) {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
    return;
  }

  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}

document.querySelectorAll("#sidebar .nav-link").forEach(link => {
  link.addEventListener("click", () => {
    if (window.innerWidth < 768) {
      toggleSidebar(true);
    }
  });
});
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const navLinks = document.querySelectorAll('.nav-link[data-route]');

  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {

      navLinks.forEach(l => l.classList.remove('active', 'text-white'));
      e.currentTarget.classList.add('active', 'text-white');

      const route = e.currentTarget.getAttribute('data-route');

      if (route === 'ventas') {
        cargarVistaVentas();
      } else if (route === 'retiros') {
        cargarVistaRetiros();
      }
    });
  });

  document.querySelector('[data-route="ventas"]').click();
});
</script>

</body>
</html>
