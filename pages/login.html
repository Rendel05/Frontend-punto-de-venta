
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tienda Oly</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png">
<link rel="manifest" href="../assets/favicon/site.webmanifest">

<link rel="stylesheet" href="../css/login-styles.css">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<main class="container" style="margin-top:3rem; display:flex; justify-content:center;">

  <section class="login-container">

    <div class="login-header">
      <a href="../index.html">
          <img src="../assets/img/logo.png" alt="Logo Tienda Olly">
      </a>
      <h1>Inicio de Sesión</h1>
    </div>

      <form id="loginForm" class="login-form">

      <div class="form-group">
        <label for="username">Usuario:</label>
        <input type="text" id="nickname" placeholder="Ingresa tu usuario" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required />
      </div>

      <button type="submit" class="login-button">Iniciar Sesión</button>
      <p id="loginMsg" style="color:red; margin-top:10px;"></p>

      <p class="volver-inicio">
        ¿Deseas <a href="../index.html">regresar al inicio</a>?
      </p>

      <p class="volver-inicio" style="margin-top: -30px;">
        ¿No tienes cuenta? <a href="register.html">Crear cuenta</a>
      </p>

    </form>

  </section>
</main>
<script src="../js/login.js"></script>
</body>
</html>
