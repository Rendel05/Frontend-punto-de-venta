<div class="container-fluid">

 <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100">

<div id="overlay" onclick="toggleSidebar()"></div>


<script>
function toggleSidebar(forceClose = false) {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  if (forceClose) {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
    return;
  }

  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}

document.querySelectorAll("#sidebar .nav-link").forEach(link => {
  link.addEventListener("click", () => {
    if (window.innerWidth < 768) {
      toggleSidebar(true);
    }
  });
});
</script>


<script>
document.addEventListener('DOMContentLoaded', () => {
  
  const navLinks = document.querySelectorAll('.nav-link[data-route]');
  
  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {

      navLinks.forEach(l => l.classList.remove('active', 'text-white'));
      
      e.currentTarget.classList.add('active', 'text-white');
      
      const route = e.currentTarget.getAttribute('data-route');
      
      if (route === 'productos') {
        cargarVistaProductos();
      }
      else if(route ==='usuarios'){
        cargarVistaUsuarios();
      }
      else if(route ==='ofertas'){
        cargarVistaOfertas();
      }  
      else if(route ==='paginas'){
        cargarVistaPaginas();
      }
      else if(route ==='cortes-caja'){
        renderCorteCaja();
      }
      else {
        initDashboard();
      }
    });
  });

  document.querySelector('[data-route="productos"]').click();
});
</script>
  
<script>
  setInterval(()=>{
  document.getElementById('fechaHora').textContent =
    new Date().toLocaleString('es-MX');
},1000);

</script>

</body>
