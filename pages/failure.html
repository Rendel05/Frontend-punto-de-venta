<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root{
      --orange:#f57a3a;
      --orange-low:#ff983c;
      --orange-dark:#e8632a;
      --muted:#6b6b6b;
      --bg:#f5f7fa;
      --text:#333;

      font-family:'Segoe UI',sans-serif;
    }

    body{
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card-success{
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      background: #fff;
      text-align: center;
    }

    .icon{
      font-size: 4rem;
      color: #dc3545;
    }

    .title{
      font-size: 1.8rem;
      font-weight: 600;
      margin-top: 1rem;
    }

    .subtitle{
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .countdown{
      font-weight: bold;
      color: var(--orange-dark);
    }

    .btn-custom{
      background-color: var(--orange);
      color: white;
      border-radius: 10px;
      padding: 0.6rem 1.5rem;
      transition: 0.3s;
    }

    .btn-custom:hover{
      background-color: var(--orange-dark);
      color: white;
    }
  </style>
</head>
<body>
    <div class="container" id="content" style="display:none;">
        <!--Contenido-->
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card-success">
                    <div id="dynamic-content">
                    <!--Contenido dinámico-->

                    <!------------------------->
                    </div>
                    <p>Serás redirigido en <span class="countdown" id="countdown">5</span> segundos...</p>
                    <a href="./cart.html" class="btn btn-custom mt-3">Volver ahora</a>
                </div>
            </div>
        </div>
  </div>

<script src="../js/failure.js"></script>
</body>
</html>
